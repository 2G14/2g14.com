version: 2
updates:
  - package-ecosystem: github-actions
    directory: /
    schedule:
      interval: weekly
      day: monday
      time: '05:00'
      timezone: Asia/Tokyo
    groups:
      actions:
        patterns: ['*']
        update-types: ['minor', 'patch']
      actions-security:
        applies-to: security-updates
        patterns: ['*']
    labels:
      - dependencies
      - github-actions
    commit-message:
      prefix: deps
    cooldown:
      default-days: 3
      semver-major-days: 7
      semver-minor-days: 3
      semver-patch-days: 1

  - package-ecosystem: npm
    directory: /
    schedule:
      interval: weekly
      day: monday
      time: '05:00'
      timezone: Asia/Tokyo
    versioning-strategy: increase
    open-pull-requests-limit: 10
    groups:
      vite:
        patterns: ['vite', '@vitejs/*']
        update-types: ['minor', 'patch']
      hono:
        patterns: ['hono', 'honox', '@hono/*']
        update-types: ['minor', 'patch']
      tailwind:
        patterns: ['tailwindcss', '@tailwindcss/*', 'daisyui']
        update-types: ['minor', 'patch']
      testing:
        patterns: ['vitest', '@vitest/*']
        update-types: ['minor', 'patch']
      linting:
        patterns: ['oxlint', 'oxfmt', '@oxc/*']
        update-types: ['minor', 'patch']
      typescript:
        patterns: ['typescript', '@tsconfig/*']
        update-types: ['minor', 'patch']
      cloudflare:
        patterns: ['wrangler', '@cloudflare/*']
        update-types: ['minor', 'patch']
      dev-dependencies:
        dependency-type: development
        update-types: ['minor', 'patch']
      production-dependencies:
        dependency-type: production
        update-types: ['minor', 'patch']
      npm-security:
        applies-to: security-updates
        patterns: ['*']
        update-types: ['patch', 'minor']
    labels:
      - dependencies
      - npm
    commit-message:
      prefix: deps
      prefix-development: deps-dev
      include: scope
    cooldown:
      default-days: 3
      semver-major-days: 7
      semver-minor-days: 5
      semver-patch-days: 2
    ignore:
      - dependency-name: '@types/node'
        update-types: ['version-update:semver-minor', 'version-update:semver-patch']
