name: CI

on:
  push:
    branches:
      - master
    paths:
      - 'app/**'
      - 'src/**'
      - 'package.json'
      - 'package-lock.json'
      - 'tsconfig.json'
      - 'vite.config.ts'
      - '.oxlintrc.json'
      - '.oxfmtrc.json'
      - '.github/workflows/**'
  pull_request:
    branches:
      - master
    paths:
      - 'app/**'
      - 'src/**'
      - 'package.json'
      - 'package-lock.json'
      - 'tsconfig.json'
      - 'vite.config.ts'
      - '.oxlintrc.json'
      - '.oxfmtrc.json'
      - '.github/workflows/**'

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read

jobs:
  ci:
    runs-on: ubuntu-slim
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          persist-credentials: false
      - uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6.4.0
        with:
          node-version: '24'
          cache: npm
      - run: npm ci
      - parallel:
          - run: npm run typecheck
          - run: npm run lint
          - run: npm run format:check
          - run: npx vitest run
          - run: npm run build
